<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content | ArtFlow POS</title>
  <link rel="icon" href="../assets/images/artflow-pos-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body data-page="content" data-root="..">
  <div class="app-shell" data-app-shell hidden>
    <aside class="sidebar">
      <a class="brand" href="./dashboard.html"><img class="brand-logo" src="../assets/images/artflow-pos-logo.svg" alt="" /><span><strong>ArtFlow POS</strong><small>Sales workspace</small></span></a>
      <nav class="nav-list" aria-label="Điều hướng chính" data-nav-list></nav>
      <div class="sidebar-card"><span class="status-dot"></span><p><strong>Đã kết nối</strong>Phiên làm việc được xác thực qua Worker.</p></div>
    </aside>
    <main class="workspace">
      <header class="topbar">
        <button class="icon-button menu-button" type="button" data-menu-toggle aria-label="Mở menu"><span data-icon="menu"></span></button>
        <div><p class="eyebrow">Content workspace</p><h1 data-page-title>Content</h1></div>
        <div class="topbar-actions">
          <label class="search-box"><span data-icon="search"></span><input data-global-search type="search" placeholder="Tìm chủ đề, sản phẩm, kênh..." /></label>
          <button class="button primary" type="button" data-open-content-item><span data-icon="plus"></span> Tạo chủ đề</button>
          <div class="user-chip" data-current-user></div>
          <button class="icon-button" type="button" data-logout aria-label="Đăng xuất"><span data-icon="logOut"></span></button>
        </div>
      </header>

      <section class="view active content-workspace">
        <section class="panel content-control-panel">
          <div class="content-filter-bar">
            <label><span>Trạng thái</span><select data-content-filter="status" data-content-status-filter></select></label>
            <label><span>Loại</span><select data-content-filter="type" data-content-type-filter></select></label>
            <label><span>Kênh</span><select data-content-filter="channel" data-content-channel-filter></select></label>
            <label><span>Phụ trách</span><select data-content-filter="owner" data-content-owner-filter></select></label>
            <label><span>Sản phẩm</span><select data-content-filter="product" data-content-product-filter></select></label>
            <label><span>Lịch đăng</span><select data-content-filter="schedule" data-content-schedule-filter></select></label>
          </div>
        </section>

        <section class="content-layout">
          <section class="panel content-table-panel content-main-panel">
            <div class="panel-header split">
              <div><h2>Danh sách chủ đề</h2><p>Brief, deadline, người phụ trách, Docs/Drive và link đã đăng.</p></div>
              <div class="row-actions">
                <button class="button ghost" type="button" data-export-content><span data-icon="download"></span> Xuất báo cáo</button>
                <button class="button ghost" type="button" data-open-content-item><span data-icon="plus"></span> Chủ đề</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Chủ đề</th><th>Trạng thái</th><th>Kênh</th><th>Phụ trách</th><th>Deadline</th><th>Tài nguyên</th><th>Thao tác</th></tr>
                </thead>
                <tbody data-content-table></tbody>
              </table>
            </div>
          </section>
        </section>
      </section>
    </main>
  </div>
  <div data-shared-ui></div>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/vendor/xlsx.bundle.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
