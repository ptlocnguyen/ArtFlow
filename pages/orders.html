<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đơn hàng | ArtFlow POS</title>
  <link rel="icon" href="../assets/images/artflow-pos-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body data-page="orders" data-root="..">
  <div class="app-shell" data-app-shell hidden>
    <aside class="sidebar"><a class="brand" href="./dashboard.html"><img class="brand-logo" src="../assets/images/artflow-pos-logo.svg" alt="" /><span><strong>ArtFlow POS</strong><small>Sales workspace</small></span></a><nav class="nav-list" aria-label="Điều hướng chính" data-nav-list></nav><div class="sidebar-card"><span class="status-dot"></span><p><strong>Đã kết nối</strong>Phiên làm việc được xác thực qua Worker.</p></div></aside>
    <main class="workspace">
      <header class="topbar"><button class="icon-button menu-button" type="button" data-menu-toggle aria-label="Mở menu"><span data-icon="menu"></span></button><div><p class="eyebrow">Bán hàng</p><h1 data-page-title>Đơn hàng</h1></div><div class="topbar-actions"><label class="search-box"><span data-icon="search"></span><input data-global-search type="search" placeholder="Tìm mã đơn, khách, SKU, mã vận đơn..." /></label><a class="button primary" href="./order-create.html" data-open-order><span data-icon="shoppingCart"></span> Tạo đơn</a><div class="user-chip" data-current-user></div><button class="icon-button" type="button" data-logout aria-label="Đăng xuất"><span data-icon="logOut"></span></button></div></header>
      <section class="view active">
        <section class="panel">
          <div class="panel-header"><div><h2>Danh sách đơn hàng</h2><p>Quản lý thanh toán, vận chuyển, trả hàng và hoàn tiền khách mua.</p></div></div>
          <div class="filter-bar">
            <label class="field"><span>Kênh</span><select data-order-channel-filter><option value="all">Tất cả kênh</option><option value="pos">POS</option><option value="website">Website</option><option value="shopee">Shopee</option><option value="lazada">Lazada</option><option value="tiktok">TikTok Shop</option><option value="facebook">Facebook</option></select></label>
            <label class="field"><span>Trạng thái</span><select data-order-status-filter><option value="all">Tất cả trạng thái</option><option value="pending">Chờ xử lý</option><option value="confirmed">Đã xác nhận</option><option value="packed">Đã đóng gói</option><option value="shipping">Đang giao</option><option value="paid">Đã thanh toán</option><option value="completed">Hoàn tất</option><option value="cancelled">Đã hủy</option></select></label>
            <label class="field"><span>Thanh toán</span><select data-order-payment-filter><option value="all">Tất cả thanh toán</option><option value="unpaid">Chưa thanh toán</option><option value="paid">Đã thanh toán</option><option value="refunded">Đã hoàn tiền</option></select></label>
            <label class="field"><span>Vận chuyển</span><select data-order-shipping-filter><option value="all">Tất cả vận chuyển</option><option value="none">Chưa giao</option><option value="preparing">Đang chuẩn bị</option><option value="shipping">Đang giao</option><option value="delivered">Đã giao</option><option value="returned">Hoàn hàng</option></select></label>
          </div>
          <div class="table-wrap"><table class="orders-table"><thead><tr><th>Mã đơn</th><th>Khách hàng/Kênh</th><th>Sản phẩm</th><th>Trạng thái</th><th>Thanh toán</th><th>Vận chuyển</th><th>Tổng tiền</th><th>Thao tác</th></tr></thead><tbody data-orders-table></tbody></table></div>
        </section>
      </section>
    </main>
  </div>
  <div data-shared-ui></div>
  <script src="../assets/js/config.js"></script><script src="../assets/js/data.js"></script><script src="../assets/js/storage.js"></script><script src="../assets/js/app.js"></script>
</body>
</html>
