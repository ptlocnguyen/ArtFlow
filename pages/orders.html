<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đơn hàng | ArtFlow POS</title>
  <link rel="icon" href="../assets/images/artflow-pos-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body data-page="orders" data-root="..">
  <div class="app-shell" data-app-shell hidden>
    <aside class="sidebar"><a class="brand" href="./dashboard.html"><img class="brand-logo" src="../assets/images/artflow-pos-logo.svg" alt="" /><span><strong>ArtFlow POS</strong><small>Sales workspace</small></span></a><nav class="nav-list" aria-label="Điều hướng chính" data-nav-list></nav><div class="sidebar-card"><span class="status-dot"></span><p><strong>Đã kết nối</strong>Phiên làm việc được xác thực qua Worker.</p></div></aside>
    <main class="workspace">
      <header class="topbar"><button class="icon-button menu-button" type="button" data-menu-toggle aria-label="Mở menu">☰</button><div><p class="eyebrow">Bán hàng</p><h1 data-page-title>Đơn hàng</h1></div><div class="topbar-actions"><label class="search-box"><span>⌕</span><input data-global-search type="search" placeholder="Tìm mã đơn, trạng thái..." /></label><button class="button primary" type="button" data-open-order>Tạo đơn</button><div class="user-chip" data-current-user></div><button class="icon-button" type="button" data-logout aria-label="Đăng xuất">↪</button></div></header>
      <section class="view active">
        <section class="panel">
          <div class="panel-header split"><div><h2>Danh sách đơn hàng</h2><p>Tạo đơn nhiều sản phẩm, theo dõi thanh toán và hoàn tồn kho khi hủy.</p></div><button class="button primary" type="button" data-open-order>Thêm đơn</button></div>
          <div class="table-wrap"><table><thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Sản phẩm</th><th>Trạng thái</th><th>Tổng tiền</th><th>Thao tác</th></tr></thead><tbody data-orders-table></tbody></table></div>
        </section>
      </section>
    </main>
  </div>
  <div data-shared-ui></div>
  <script src="../assets/js/config.js"></script><script src="../assets/js/data.js"></script><script src="../assets/js/storage.js"></script><script src="../assets/js/app.js"></script>
</body>
</html>
