<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kho hàng | ArtFlow POS</title>
  <link rel="icon" href="../assets/images/artflow-pos-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body data-page="inventory" data-root="..">
  <div class="app-shell" data-app-shell hidden>
    <aside class="sidebar"><a class="brand" href="./dashboard.html"><img class="brand-logo" src="../assets/images/artflow-pos-logo.svg" alt="" /><span><strong>ArtFlow POS</strong><small>Sales workspace</small></span></a><nav class="nav-list" aria-label="Điều hướng chính" data-nav-list></nav><div class="sidebar-card"><span class="status-dot"></span><p><strong>Đã kết nối</strong>Phiên làm việc được xác thực qua Worker.</p></div></aside>
    <main class="workspace">
      <header class="topbar"><button class="icon-button menu-button" type="button" data-menu-toggle aria-label="Mở menu">☰</button><div><p class="eyebrow">Tồn kho</p><h1 data-page-title>Kho hàng</h1></div><div class="topbar-actions"><label class="search-box"><span>⌕</span><input data-global-search type="search" placeholder="Tìm SKU, sản phẩm, lý do biến động..." /></label><button class="button ghost" type="button" data-open-stock-adjust>Điều chỉnh tồn</button><button class="button primary" type="button" data-open-stock-receive>Nhập kho</button><button class="button ghost" type="button" data-open-product>Thêm sản phẩm</button><div class="user-chip" data-current-user></div><button class="icon-button" type="button" data-logout aria-label="Đăng xuất">↪</button></div></header>
      <section class="view active">
        <div class="inventory-grid" data-inventory-cards></div>
        <section class="panel"><div class="panel-header"><div><h2>Cảnh báo tồn kho</h2><p>Các SKU cần ưu tiên nhập thêm.</p></div></div><div class="mini-list" data-low-stock></div></section>
        <section class="panel"><div class="panel-header split"><div><h2>Lịch sử biến động kho</h2><p>Theo dõi nhập kho, bán hàng, hủy đơn và điều chỉnh kiểm kho.</p></div><button class="button primary" type="button" data-open-stock-receive>Nhập kho</button></div><div class="table-wrap"><table><thead><tr><th>Sản phẩm</th><th>Loại</th><th>Thay đổi</th><th>Tồn trước/sau</th><th>Lý do</th><th>Thời gian</th></tr></thead><tbody data-stock-movements-table></tbody></table></div></section>
      </section>
    </main>
  </div>
  <div data-shared-ui></div>
  <script src="../assets/js/config.js"></script><script src="../assets/js/data.js"></script><script src="../assets/js/storage.js"></script><script src="../assets/js/app.js"></script>
</body>
</html>
