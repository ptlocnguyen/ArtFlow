<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xin vía | ArtFlow POS</title>
  <link rel="icon" href="../assets/images/artflow-pos-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body data-page="incense" data-root="..">
  <div class="app-shell" data-app-shell hidden>
    <aside class="sidebar">
      <a class="brand" href="./dashboard.html"><img class="brand-logo" src="../assets/images/artflow-pos-logo.svg" alt="" /><span><strong>ArtFlow POS</strong><small>Sales workspace</small></span></a>
      <nav class="nav-list" aria-label="Điều hướng chính" data-nav-list></nav>
      <div class="sidebar-card"><span class="status-dot"></span><p><strong>Đã kết nối</strong>Phiên làm việc được xác thực qua Worker.</p></div>
    </aside>
    <main class="workspace">
      <header class="topbar">
        <button class="icon-button menu-button" type="button" data-menu-toggle aria-label="Mở menu"><span data-icon="menu"></span></button>
        <div><p class="eyebrow">Góc vui</p><h1 data-page-title>Xin vía</h1></div>
        <div class="topbar-actions">
          <div class="user-chip" data-current-user></div>
          <button class="icon-button" type="button" data-logout aria-label="Đăng xuất"><span data-icon="logOut"></span></button>
        </div>
      </header>

      <section class="view active incense-workspace">
        <section class="panel incense-panel">
          <div class="incense-scene" aria-hidden="true">
            <img class="incense-altar" src="../assets/images/than-tai-tho-dia-altar.png" alt="" />
            <span class="incense-aura"></span>
            <span class="incense-smoke smoke-one"></span>
            <span class="incense-smoke smoke-two"></span>
            <span class="incense-smoke smoke-three"></span>
            <span class="incense-smoke smoke-four"></span>
            <span class="incense-smoke smoke-five"></span>
            <span class="incense-spark spark-one"></span>
            <span class="incense-spark spark-two"></span>
            <span class="incense-spark spark-three"></span>
            <div class="incense-sticks"><i></i><i></i><i></i></div>
            <div class="offering-tray" data-offering-tray></div>
            <div class="monkey-troupe">
              <img class="monkey monkey-swing" src="../assets/images/chibi-monkey.png" alt="" />
              <img class="monkey monkey-climb" src="../assets/images/chibi-monkey.png" alt="" />
              <img class="monkey monkey-peek" src="../assets/images/chibi-monkey.png" alt="" />
              <img class="monkey monkey-hop" src="../assets/images/chibi-monkey.png" alt="" />
            </div>
            <div class="incense-bowl"></div>
          </div>
          <form class="incense-form" data-incense-form>
            <input type="hidden" name="kind" value="sales" data-incense-kind />
            <input type="hidden" name="offerings" value="banana" data-incense-offerings />
            <div class="incense-kind-grid" aria-label="Chọn điều muốn xin vía">
              <button class="active" type="button" data-incense-kind-choice="sales"><span data-icon="shoppingCart"></span><b>Đơn</b></button>
              <button type="button" data-incense-kind-choice="content"><span data-icon="sparkles"></span><b>Content</b></button>
              <button type="button" data-incense-kind-choice="stock"><span data-icon="warehouse"></span><b>Kho</b></button>
              <button type="button" data-incense-kind-choice="cash"><span data-icon="wallet"></span><b>Tiền</b></button>
              <button type="button" data-incense-kind-choice="bug"><span data-icon="settings"></span><b>Bug</b></button>
              <button type="button" data-incense-kind-choice="team"><span data-icon="users"></span><b>Team</b></button>
            </div>
            <div class="incense-offerings" aria-label="Chọn đồ cúng chay">
              <button class="active" type="button" data-offering-choice="banana" title="Chuối" aria-label="Chuối"><img src="../assets/images/offerings/banana-bunch.png" alt="" /><span>Chuối</span></button>
              <button type="button" data-offering-choice="fruit" title="Trái cây" aria-label="Trái cây"><img src="../assets/images/offerings/fruit-plate.png" alt="" /><span>Trái cây</span></button>
              <button type="button" data-offering-choice="cake" title="Bánh chay" aria-label="Bánh chay"><img src="../assets/images/offerings/vegan-cake.png" alt="" /><span>Bánh chay</span></button>
              <button type="button" data-offering-choice="tea" title="Trà" aria-label="Trà"><img src="../assets/images/offerings/tea-cup.png" alt="" /><span>Trà</span></button>
              <button type="button" data-offering-choice="water" title="Nước" aria-label="Nước"><img src="../assets/images/offerings/water-glass.png" alt="" /><span>Nước</span></button>
              <button type="button" data-offering-choice="flower" title="Hoa sen" aria-label="Hoa sen"><img src="../assets/images/offerings/lotus-flowers.png" alt="" /><span>Hoa sen</span></button>
              <button type="button" data-offering-choice="orange" title="Cam" aria-label="Cam"><img src="../assets/images/offerings/orange.png" alt="" /><span>Cam</span></button>
              <button type="button" data-offering-choice="apple" title="Táo" aria-label="Táo"><img src="../assets/images/offerings/apple.png" alt="" /><span>Táo</span></button>
              <button type="button" data-offering-choice="watermelon" title="Dưa hấu" aria-label="Dưa hấu"><img src="../assets/images/offerings/watermelon.png" alt="" /><span>Dưa hấu</span></button>
              <button type="button" data-offering-choice="sticky_rice" title="Xôi chay" aria-label="Xôi chay"><img src="../assets/images/offerings/sticky-rice.png" alt="" /><span>Xôi</span></button>
              <button type="button" data-offering-choice="coconut" title="Dừa" aria-label="Dừa"><img src="../assets/images/offerings/coconut.png" alt="" /><span>Dừa</span></button>
              <button type="button" data-offering-choice="sweet_soup" title="Chè chay" aria-label="Chè chay"><img src="../assets/images/offerings/sweet-soup.png" alt="" /><span>Chè</span></button>
            </div>
            <label class="incense-input-row">
              <span data-icon="edit"></span>
              <input name="wish" data-incense-wish maxlength="160" placeholder="Một câu thôi..." autocomplete="off" />
              <button class="button primary" type="submit">Thắp</button>
            </label>
            <p data-incense-result>Xin chốt đơn mượt.</p>
          </form>
        </section>

        <section class="panel incense-history-panel">
          <div class="panel-header split">
            <div><h2>Gần đây</h2><p>Lời chúc vui, lưu lại cho cả team.</p></div>
          </div>
          <div class="incense-history" data-incense-history></div>
        </section>
      </section>
    </main>
  </div>
  <div data-shared-ui></div>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
